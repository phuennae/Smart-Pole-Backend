<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Energy Grafana Style</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: #e5e7eb;
}

/* HEADER */
header {
  padding: 12px;
  background: #111827;
  text-align: center;
  font-weight: bold;
}

/* KPI */
.cards {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  padding: 10px;
}

.card {
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card h1 {
  margin: 5px 0;
  font-size: 18px;
}

/* CONTROL */
.controls {
  text-align: center;
  margin: 10px;
}

button {
  background: #1f2937;
  color: white;
  border: none;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 6px;
}

/* GRAPH */
.chart-box {
  margin: 10px;
  background: #111827;
  border-radius: 12px;
  padding: 10px;
}

canvas {
  width: 100%;
  height: 320px !important;
}
</style>
</head>

<body>

<header>⚡ Energy Dashboard (Grafana Style)</header>

<div class="controls">
  <button onclick="loadHistory(3600000)">1H</button>
  <button onclick="loadHistory(86400000)">24H</button>
</div>

<div class="cards">
  <div class="card"><h3>V</h3><h1 id="v">-</h1></div>
  <div class="card"><h3>A</h3><h1 id="c">-</h1></div>
  <div class="card"><h3>W</h3><h1 id="p">-</h1></div>
  <div class="card"><h3>Wh</h3><h1 id="e">-</h1></div>
</div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<script>
const TB_URL = "http://theoneiot.i234.me:9090";
const DEVICE_ID = "bc2557d0-46a8-11f1-8573-dd37fef65191";

let token;

// ===== CHART =====
const chart = new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: "Voltage", data: [], borderColor: "#22c55e", tension:0.3 },
      { label: "Current", data: [], borderColor: "#3b82f6", tension:0.3 },
      { label: "Power", data: [], borderColor: "#f59e0b", tension:0.3 },
      { label: "Energy", data: [], borderColor: "#ef4444", tension:0.3 }
    ]
  },
  options: {
    animation:false,
    responsive:true,
    plugins:{
      legend:{
        labels:{ color:"#e5e7eb" }
      },
      zoom:{
        zoom:{wheel:{enabled:true},mode:'x'},
        pan:{enabled:true,mode:'x'}
      }
    },
    scales:{
      x:{ ticks:{color:"#9ca3af"} },
      y:{ ticks:{color:"#9ca3af"} }
    }
  }
});

// ===== LOGIN =====
async function login(){
  const r = await fetch(TB_URL+"/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:"tenant@thingsboard.org",
      password:"tenant"
    })
  });
  return (await r.json()).token;
}

// ===== REALTIME =====
async function realtime(){
  const r = await fetch(
    `${TB_URL}/api/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=voltage,current,power,energy`,
    {headers:{"X-Authorization":"Bearer "+token}}
  );

  const d = await r.json();

  document.getElementById("v").innerText = d.voltage?.slice(-1)[0]?.value ?? "-";
  document.getElementById("c").innerText = d.current?.slice(-1)[0]?.value ?? "-";
  document.getElementById("p").innerText = d.power?.slice(-1)[0]?.value ?? "-";
  document.getElementById("e").innerText = d.energy?.slice(-1)[0]?.value ?? "-";
}

// ===== HISTORY =====
async function loadHistory(ms){

  const end = Date.now();
  const start = end - ms;

  const r = await fetch(
    `${TB_URL}/api/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=voltage,current,power,energy&startTs=${start}&endTs=${end}&interval=60000`,
    {headers:{"X-Authorization":"Bearer "+token}}
  );

  const d = await r.json();

  let combined = d.voltage.map((v,i)=>({
    ts:v.ts,
    voltage:parseFloat(v.value),
    current:parseFloat(d.current[i]?.value||0),
    power:parseFloat(d.power[i]?.value||0),
    energy:parseFloat(d.energy[i]?.value||0)
  }));

  combined.sort((a,b)=>a.ts-b.ts);

  chart.data.labels = combined.map(x =>
    new Date(x.ts).toLocaleTimeString('en-GB')
  );

  chart.data.datasets[0].data = combined.map(x=>x.voltage);
  chart.data.datasets[1].data = combined.map(x=>x.current);
  chart.data.datasets[2].data = combined.map(x=>x.power);
  chart.data.datasets[3].data = combined.map(x=>x.energy);

  chart.update();
}

// ===== START =====
(async ()=>{
  token = await login();
  await loadHistory(3600000);
  setInterval(realtime,2000);
})();
</script>

</body>
</html>
